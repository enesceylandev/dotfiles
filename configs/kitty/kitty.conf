# vim:fileencoding=utf-8:ft=conf:foldmethod=marker

font_family      Iosevka Term
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 18.0

cursor_trail_decay 0.1 0.4
cursor_trail 1
cursor_shape block

cursor_blink_interval 0

draw_minimal_borders yes
window_margin_width 5
window_padding_width 3

background_opacity 1

editor nvim

# Color theme
include colors.conf

# Font rendering
font_smooth_body 0
box_drawing_scale 0.001, 1, 1.5, 2
confirm_os_window_close 0

# Disable default tab shortcuts (conflicts with tmux)
map cmd+t no_op
map cmd+w no_op

# Tmux window navigation via escape sequences (cmd+1-9)
map cmd+1 send_text all \x1b[11~
map cmd+2 send_text all \x1b[12~
map cmd+3 send_text all \x1b[13~
map cmd+4 send_text all \x1b[14~
map cmd+5 send_text all \x1b[15~
map cmd+6 send_text all \x1b[17~
map cmd+7 send_text all \x1b[18~
map cmd+8 send_text all \x1b[19~
map cmd+9 send_text all \x1b[20~
