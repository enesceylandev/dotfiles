##### TERMINAL #####
set -g default-terminal "xterm-256color"
set -g xterm-keys on
set -sa terminal-overrides ',xterm*:Tc'
set -sa terminal-overrides ',xterm*:kNXT5=\x1b[1;5I:kPRV5=\x1b[1;6I'

##### PREFIX #####
unbind C-b
set -g prefix C-Space
set -g status-position bottom 
set -g status-justify absolute-centre
set -g status-bg default
bind C-Space send-prefix
set -g base-index 1
setw -g pane-base-index 1

##### VIM-TMUX NAVIGATOR DETECTION #####
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
is_ai_or_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(g?(view|n?vim?x?)(diff)?|claude|opencode)'"

##### PANE NAVIGATION (Ctrl + hjkl) - VIM AWARE #####
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"

##### PANE RESIZE (Prefix + hjkl, repeatable) #####
set -g repeat-time 1000
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5
bind -r k resize-pane -U 3
bind -r j resize-pane -D 3

##### SPLIT (Ctrl + v/s) #####
bind -n C-v if-shell "$is_ai_or_vim" "send-keys C-v" "split-window -h -c '#{pane_current_path}'"
bind -n C-s if-shell "$is_ai_or_vim" "send-keys C-s" "split-window -v -c '#{pane_current_path}'"

##### KILL PANE && OPEN NEW WINDOW #####
bind -n C-w if-shell "$is_vim" "send-keys C-w" "kill-pane"
bind -n C-t new-window -c "#{pane_current_path}"    # Mevcut dizinde yeni window

##### SMART WINDOW SWITCH (create if missing) #####
bind -n M-1 if-shell 'tmux list-windows | grep -q "^1:"' 'select-window -t 1' 'new-window -t 1'
bind -n M-2 if-shell 'tmux list-windows | grep -q "^2:"' 'select-window -t 2' 'new-window -t 2'
bind -n M-3 if-shell 'tmux list-windows | grep -q "^3:"' 'select-window -t 3' 'new-window -t 3'
bind -n M-4 if-shell 'tmux list-windows | grep -q "^4:"' 'select-window -t 4' 'new-window -t 4'
bind -n M-5 if-shell 'tmux list-windows | grep -q "^5:"' 'select-window -t 5' 'new-window -t 5'
bind -n M-6 if-shell 'tmux list-windows | grep -q "^6:"' 'select-window -t 6' 'new-window -t 6'
bind -n M-7 if-shell 'tmux list-windows | grep -q "^7:"' 'select-window -t 7' 'new-window -t 7'
bind -n M-8 if-shell 'tmux list-windows | grep -q "^8:"' 'select-window -t 8' 'new-window -t 8'
bind -n M-9 if-shell 'tmux list-windows | grep -q "^9:"' 'select-window -t 9' 'new-window -t 9'

##### CMD+1-9 (via kitty escape sequences) #####
bind -n F1 if-shell 'tmux list-windows | grep -q "^1:"' 'select-window -t 1' 'new-window -t 1'
bind -n F2 if-shell 'tmux list-windows | grep -q "^2:"' 'select-window -t 2' 'new-window -t 2'
bind -n F3 if-shell 'tmux list-windows | grep -q "^3:"' 'select-window -t 3' 'new-window -t 3'
bind -n F4 if-shell 'tmux list-windows | grep -q "^4:"' 'select-window -t 4' 'new-window -t 4'
bind -n F5 if-shell 'tmux list-windows | grep -q "^5:"' 'select-window -t 5' 'new-window -t 5'
bind -n F6 if-shell 'tmux list-windows | grep -q "^6:"' 'select-window -t 6' 'new-window -t 6'
bind -n F7 if-shell 'tmux list-windows | grep -q "^7:"' 'select-window -t 7' 'new-window -t 7'
bind -n F8 if-shell 'tmux list-windows | grep -q "^8:"' 'select-window -t 8' 'new-window -t 8'
bind -n F9 if-shell 'tmux list-windows | grep -q "^9:"' 'select-window -t 9' 'new-window -t 9'

##### COPY MODE (macOS clipboard) #####
set -g mouse on
set -g set-clipboard on
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

##### COPY MODE NAVIGATION #####
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R


##### ZOOM PANE (Ctrl + f) #####
bind -n C-f if-shell "$is_vim" "send-keys C-f" "resize-pane -Z"
